name: Diabetes ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Run tests
  # ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # Job 2: Train and evaluate diabetes model
  # ──────────────────────────────────────────────
  train:
    name: Train Diabetes Model
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train diabetes model
        run: python src/train_diabetes.py

      - name: Upload diabetes metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diabetes-metrics
          path: metrics/diabetes_results.json

      - name: Upload diabetes model
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: diabetes-model
          path: models/diabetes_model.pkl
